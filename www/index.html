<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>陪伴学习 · 白噪音</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;user-select:none;-webkit-user-select:none;overscroll-behavior:none}
body{background:radial-gradient(ellipse at center,#1a0a00 0%,#000 100%)}
.scene-canvas{position:fixed;inset:0;opacity:0;transition:opacity .8s ease;pointer-events:none;z-index:0}
.scene-canvas.active{opacity:1;z-index:1}
.scene-canvas canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,rgba(0,0,0,.15) 0%,rgba(0,0,0,.4) 100%)}
.dim-overlay{position:fixed;inset:0;z-index:1;background:#000;opacity:0;pointer-events:none;transition:opacity .4s}
.dim-overlay.on{opacity:.4}
.focus-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);z-index:2;padding:48px 72px;border-radius:28px;background:rgba(0,0,0,.12);backdrop-filter:blur(40px) saturate(1.1);-webkit-backdrop-filter:blur(40px) saturate(1.1);border:1px solid rgba(255,255,255,.06);box-shadow:0 4px 24px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.04);opacity:0;pointer-events:auto;cursor:pointer;transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1)}
.focus-card.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.focus-card:active{transform:translate(-50%,-50%) scale(.96)}
.focus-card.style-b{padding:56px 80px}
.focus-time{font-size:88px;font-weight:300;letter-spacing:4px;text-shadow:0 2px 12px rgba(0,0,0,.5)}.focus-card.style-b .focus-time{font-size:112px}
.idle-time{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:2;font-size:14px;font-weight:400;letter-spacing:1px;opacity:0;transition:opacity .8s;color:rgba(255,255,255,.5);text-shadow:0 1px 4px rgba(0,0,0,.3)}
.idle-time.on{opacity:1}
.idle-timer{position:fixed;top:28px;right:28px;z-index:2;font-size:13px;font-weight:400;letter-spacing:1px;opacity:0;transition:opacity .8s;color:rgba(255,255,255,.4);text-shadow:0 1px 4px rgba(0,0,0,.3)}
.idle-timer.on{opacity:1}
.idle-scene{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);z-index:2;font-size:13px;letter-spacing:1px;opacity:0;transition:opacity .8s;color:rgba(255,255,255,.45);text-shadow:0 1px 4px rgba(0,0,0,.3);white-space:nowrap}
.idle-scene.on{opacity:1}
.idle-dot{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:2;width:5px;height:5px;border-radius:50%;background:rgba(74,222,128,.7);opacity:0;transition:opacity .6s,background .3s}
.idle-dot.on{opacity:1}
.tap-layer{position:fixed;inset:0;z-index:3}
.ctrl-layer{position:fixed;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;pointer-events:none}
.ctrl-layer.show{pointer-events:auto}
.ctrl-close{position:fixed;top:48px;right:48px;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.35);font-size:13px;padding:4px 10px;border-radius:12px;cursor:pointer;opacity:0;transition:opacity .4s}
.ctrl-layer.show .ctrl-close{opacity:1}
.ctrl-clock{position:fixed;top:48px;left:50%;transform:translateX(-50%);background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;font-weight:300;letter-spacing:2px;cursor:pointer;opacity:0;transition:opacity .4s}
.ctrl-layer.show .ctrl-clock{opacity:1}
.ctrl-arrow{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-size:24px;width:50px;height:50px;border-radius:50%;cursor:pointer;opacity:0;transition:opacity .4s,background .2s;pointer-events:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ctrl-layer.show .ctrl-arrow{opacity:1;pointer-events:auto}
.ctrl-arrow.left{left:24px}
.ctrl-arrow.right{right:24px}
.ctrl-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;background:rgba(0,0,0,.4);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);border:1px solid rgba(255,255,255,.07);opacity:0;transition:opacity .4s;pointer-events:none}
.ctrl-layer.show .ctrl-bar{opacity:1;pointer-events:auto}
.ctrl-scene-icon{background:rgba(255,255,255,.04);border:none;color:rgba(255,255,255,.4);font-size:14px;width:32px;height:32px;border-radius:10px;cursor:pointer;transition:background .2s,color .15s,transform .15s}
.ctrl-scene-icon:hover,.ctrl-scene-icon:active{background:rgba(255,255,255,.1);color:#fff;transform:scale(1.1)}
.ctrl-scene-icon.active{background:rgba(255,255,255,.12);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.ctrl-spacer{width:8px}
.ctrl-btn{background:rgba(255,255,255,.04);border:none;color:rgba(255,255,255,.5);font-size:13px;width:30px;height:30px;border-radius:10px;cursor:pointer;transition:background .2s}
.ctrl-btn:hover,.ctrl-btn:active{background:rgba(255,255,255,.1);color:#fff}
.ctrl-btn.timer-btn{width:auto;padding:0 8px;font-size:12px}
.ctrl-btn.heart-btn{width:auto;padding:0 6px;font-size:13px}
.panel-overlay{position:fixed;inset:0;z-index:8;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .35s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.panel-overlay.open{opacity:1;pointer-events:auto}
.panel-sheet{position:fixed;bottom:0;left:0;right:0;z-index:9;max-height:70vh;background:rgba(18,18,22,.92);backdrop-filter:blur(40px) saturate(1.3);-webkit-backdrop-filter:blur(40px) saturate(1.3);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);overflow-y:auto;display:flex;flex-direction:column}
.panel-sheet.open{transform:translateY(0)}
.panel-grip{width:36px;height:4px;border-radius:4px;background:rgba(255,255,255,.15);margin:8px auto}
.panel-hd{display:flex;justify-content:space-between;align-items:center;padding:2px 20px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.panel-hd h3{font-size:15px;font-weight:500;letter-spacing:.5px}
.panel-hd button{background:none;border:none;color:rgba(255,255,255,.3);font-size:18px;cursor:pointer;padding:4px}
.panel-body{padding:12px 16px 24px;flex:1;overflow-y:auto}
.panel-tabs{display:flex;gap:6px;margin-bottom:12px}
.panel-tab{background:rgba(255,255,255,.04);border:none;color:rgba(255,255,255,.4);font-size:12px;padding:5px 12px;border-radius:12px;cursor:pointer;transition:all .2s}
.panel-tab.active{background:rgba(255,255,255,.1);color:#fff}
.sound-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:7px}
.sound-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border-radius:12px;background:rgba(255,255,255,.03);cursor:pointer;transition:background .2s;border:1px solid transparent}
.sound-item:active{background:rgba(255,255,255,.08)}
.sound-item.active{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.06)}
.sound-item .si-icon{font-size:18px}
.sound-item .si-label{font-size:9px;opacity:.6;text-align:center;word-break:break-all;line-height:1.2}
.sound-item .si-vol{width:100%;margin-top:2px}
.music-search-box{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 14px;color:#fff;font-size:13px;outline:none;margin-bottom:8px}
.music-search-box::placeholder{color:rgba(255,255,255,.25)}
.mu-item{display:flex;align-items:center;padding:8px 10px;border-radius:10px;cursor:pointer;gap:10px}
.mu-item:active{background:rgba(255,255,255,.06)}
.mu-item .mu-cover{width:36px;height:36px;border-radius:6px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mu-item .mu-info{flex:1;min-width:0}
.mu-item .mu-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mu-item .mu-art{font-size:10px;opacity:.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mu-item .mu-add{font-size:16px;opacity:.4;padding:4px}
.mu-empty{text-align:center;padding:24px;opacity:.3;font-size:13px}
.mini-player{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.04);margin-top:8px}
.mini-player .mu-cover{width:36px;height:36px;border-radius:6px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mini-player .mu-info{flex:1;min-width:0}
.mini-player .mu-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-player .mu-art{font-size:10px;opacity:.4}
.mini-player button{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:14px;width:30px;height:30px;border-radius:50%;cursor:pointer}
.mini-player .mu-vol{width:50px;accent-color:rgba(255,255,255,.4)}
input[type=range]{-webkit-appearance:none;background:rgba(255,255,255,.1);height:3px;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer}
.fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px}
.fav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:10px;background:rgba(255,255,255,.03);cursor:pointer;font-size:11px;transition:background .15s}
.fav-item:active{background:rgba(255,255,255,.07)}
.timer-modes{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.timer-mode{background:rgba(255,255,255,.04);border:none;color:rgba(255,255,255,.4);font-size:12px;padding:5px 12px;border-radius:12px;cursor:pointer;transition:all .2s}
.timer-mode.active{background:rgba(255,255,255,.1);color:#fff}
.timer-display{text-align:center;font-size:56px;font-weight:200;letter-spacing:4px;padding:12px 0 4px;font-variant-numeric:tabular-nums}
.timer-label{text-align:center;font-size:11px;opacity:.4;margin-bottom:12px}
.timer-actions{display:flex;justify-content:center;gap:10px;margin-bottom:8px}
.timer-actions button{background:rgba(255,255,255,.06);border:none;color:#fff;font-size:13px;padding:7px 18px;border-radius:16px;cursor:pointer}
.timer-actions button.primary{background:rgba(255,255,255,.12)}
.timer-set{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.timer-set input{width:48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px;color:#fff;text-align:center;font-size:16px}
.login-overlay{position:fixed;inset:0;z-index:10;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.login-overlay.open{display:flex}
.login-card{background:rgba(20,20,26,.95);border-radius:24px;padding:28px 32px;max-width:320px;width:90%;position:relative;text-align:center;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.06)}
.login-card .btn-close{position:absolute;top:12px;right:16px;background:none;border:none;color:rgba(255,255,255,.3);font-size:18px;cursor:pointer}
.login-card h3{font-size:17px;font-weight:500;margin-bottom:6px}
.login-card p{font-size:12px;opacity:.5;margin-bottom:16px}
.qr-wrap{width:150px;height:150px;margin:0 auto;background:rgba(255,255,255,.04);border-radius:12px;display:flex;align-items:center;justify-content:center}
.qr-wrap img{width:100%;height:100%;border-radius:12px}
.qr-text{font-size:12px;opacity:.5;margin-top:8px}
.login-card input{display:block;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;color:#fff;font-size:13px;margin-bottom:8px;outline:none}
.login-card .btn-primary{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:13px;padding:7px 20px;border-radius:14px;cursor:pointer;width:100%;margin-top:4px}
.login-card .btn-switch{background:none;border:none;color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;margin-top:12px;text-decoration:underline}
</style>
</head>
<body>
<div class="scene-canvas" id="cv0"><canvas id="c0"></canvas></div>
<div class="scene-canvas" id="cv1"><canvas id="c1"></canvas></div>
<div class="scene-canvas" id="cv2"><canvas id="c2"></canvas></div>
<div class="scene-canvas" id="cv3"><canvas id="c3"></canvas></div>
<div class="scene-canvas" id="cv4"><canvas id="c4"></canvas></div>
<div class="scene-canvas" id="cv5"><canvas id="c5"></canvas></div>
<div class="scene-canvas" id="cv6"><canvas id="c6"></canvas></div>
<div class="vignette"></div>
<div class="dim-overlay" id="dimOverlay"></div>
<div class="focus-card" id="focusCard" onclick="if(focusMode)toggleFocus()"><div class="focus-time" id="focusTime">14:32</div></div>
<div class="idle-time" id="idleTime">14:32</div>
<div class="idle-timer" id="idleTimer"></div>
<div class="idle-scene" id="idleScene">🔥 壁炉 · 冬夜</div>
<div class="idle-dot" id="idleDot"></div>
<div class="tap-layer" id="tapLayer"></div>
<div class="ctrl-layer" id="ctrlLayer">
  <button class="ctrl-close" id="ctrlClose">✕</button>
  <button class="ctrl-clock" id="ctrlClock">14:32</button>
  <button class="ctrl-arrow left" id="ctrlLeft">◀</button>
  <button class="ctrl-arrow right" id="ctrlRight">▶</button>
  <div class="ctrl-bar" id="ctrlBar">
    <button class="ctrl-scene-icon active" data-scene="0">🔥</button>
    <button class="ctrl-scene-icon" data-scene="1">🏞️</button>
    <button class="ctrl-scene-icon" data-scene="2">🌊</button>
    <button class="ctrl-scene-icon" data-scene="3">🌅</button>
    <button class="ctrl-scene-icon" data-scene="4">❄️</button>
    <button class="ctrl-scene-icon" data-scene="5">☕</button>
    <button class="ctrl-scene-icon" data-scene="6">☔</button>
    <div class="ctrl-spacer"></div>
    <button class="ctrl-btn" id="ctrlMute">🔊</button>
    <button class="ctrl-btn" id="ctrlDim">🌓</button>
    <button class="ctrl-btn" id="ctrlFocus" style="opacity:.5">◎</button>
    <button class="ctrl-btn timer-btn" id="ctrlTimerBtn">⏱️ <span id="ctrlTimerTxt">00:00</span></button>
    <button class="ctrl-btn heart-btn" id="ctrlHeart">❤️</button>
    <button class="ctrl-btn" id="ctrlSettings">🎵</button>
  </div>
</div>
<div class="panel-overlay" id="soundOverlay"></div>
<div class="panel-sheet" id="soundPanel">
  <div class="panel-grip"></div><div class="panel-hd"><h3>🎵 声音控制</h3><button id="soundClose">✕</button></div>
  <div class="panel-body">
    <div class="panel-tabs" id="soundTabs">
      <button class="panel-tab active" data-tab="noise">白噪音</button>
      <button class="panel-tab" data-tab="music">🎵 网易云</button>
      <button class="panel-tab" data-tab="fav">❤️ 收藏</button>
    </div>
    <div id="tabNoise"></div>
    <div id="tabMusic" style="display:none">
      <button class="ctrl-btn" id="musicLoginBtn" style="width:auto;padding:6px 14px;font-size:12px;margin-bottom:8px;border-radius:14px">🔓 登录网易云</button>
      <input class="music-search-box" id="musicSearch" placeholder="搜索歌曲..." autocomplete="off">
      <div id="musicResults"><div class="mu-empty">输入关键词搜索</div></div>
      <div class="mini-player" id="miniPlayer" style="display:none">
        <div class="mu-cover">🎵</div>
        <div class="mu-info"><div class="mu-name" id="nowPlaying">-</div><div class="mu-art" id="nowArtist">-</div></div>
        <button id="miniPlayBtn">▶</button>
        <input type="range" class="mu-vol" id="miniVol" min="0" max="100" value="70">
      </div>
    </div>
    <div id="tabFav" style="display:none"><div class="fav-grid" id="favGrid"></div></div>
  </div>
</div>
<div class="panel-overlay" id="timerOverlay"></div>
<div class="panel-sheet" id="timerPanel">
  <div class="panel-grip"></div><div class="panel-hd"><h3>⏱️ 计时</h3><button id="timerClose">✕</button></div>
  <div class="panel-body">
    <div class="timer-modes" id="timerModes">
      <button class="timer-mode active" data-mode="clock">🕐 时钟</button>
      <button class="timer-mode" data-mode="stopwatch">▶ 正计时</button>
      <button class="timer-mode" data-mode="countdown">⏳ 倒计时</button>
      <button class="timer-mode" data-mode="pomodoro">🍅 番茄</button>
    </div>
    <div class="timer-display" id="timerDisplay">14:32:00</div>
    <div class="timer-label" id="timerLabel">当前时间</div>
    <div class="timer-actions" id="timerActions">
      <button class="primary" id="timerMainBtn">▶ 开始</button>
      <button id="timerResetBtn">↺ 重置</button>
    </div>
    <div class="timer-set" id="timerSet" style="display:none">
      <input type="number" id="tsMin" value="25" min="1" max="120"> <span>:</span>
      <input type="number" id="tsSec" value="0" min="0" max="59">
    </div>
    <div id="timerStats"></div>
  </div>
</div>
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <button class="btn-close" id="loginClose">✕</button>
    <h3 id="loginTitle">📱 扫码登录</h3>
    <p id="loginHint">打开网易云音乐 App 扫描二维码</p>
    <div class="qr-wrap" id="qrWrap"><img id="qrImg" src="" alt=""></div>
    <div class="qr-text" id="qrText">获取中...</div>
    <div id="phoneFields" style="display:none">
      <input type="text" id="phoneInput" placeholder="手机号">
      <input type="password" id="pwInput" placeholder="密码">
      <button class="btn-primary" id="phoneSubmit">登录</button>
      <div id="phoneMsg" style="font-size:12px;margin-top:6px;opacity:.6"></div>
    </div>
    <button class="btn-switch" id="switchLogin">📱 使用手机号登录</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const SCENES = [
  { id:'fireplace', icon:'🔥', name:'壁炉 · 冬夜', video:'videos/fireplace.mp4', tone:'#ff8c42' },
  { id:'rain', icon:'🏞️', name:'山涧溪流', video:'videos/rain.mp4', tone:'#7eb8a0' },
  { id:'ocean', icon:'🌊', name:'海浪沙滩', video:'videos/ocean.mp4', tone:'#3a7bd5' },
  { id:'snow', icon:'🌅', name:'雪地夕阳', video:'videos/snow.mp4', tone:'#8b6b9e' },
  { id:'forest', icon:'❄️', name:'森林雪夜', video:'videos/forest.mp4', tone:'#4a6fa5' },
  { id:'cafe', icon:'☕', name:'角落咖啡', video:'videos/cafe.mp4', tone:'#8d6e63' },
  { id:'cafe_rain', icon:'☔', name:'雨中咖啡', video:'videos/cafe_rain.mp4', tone:'#5b7b9a' },
];
const SCENE_COUNT = SCENES.length;

// ── Sounds ──
const CATS = [
  { id:'preset', name:'⭐ 当前场景音效' },
  { id:'rain', name:'🌧️ 雨声', sounds:['light-rain','heavy-rain','rain-on-window','rain-on-leaves','rain-on-tent','rain-on-umbrella','rain-on-car-roof','thunder'] },
  { id:'nature', name:'🌿 自然', sounds:['campfire','wind','howling-wind','wind-in-trees','river','waterfall','waves','walk-on-leaves','walk-on-snow','walk-on-gravel','droplets','jungle'] },
  { id:'animals', name:'🐾 动物', sounds:'birds seagulls crickets wolf owl frog cat-purring whale beehive chickens cows crows dog-barking horse-gallop sheep woodpecker'.split(' ') },
  { id:'urban', name:'🏙️ 城市', sounds:['busy-street','road','traffic','highway','crowd','fireworks','ambulance-siren'] },
  { id:'places', name:'🏛️ 场所', sounds:['cafe','library','office','restaurant','church','supermarket','subway-station','construction-site','airport','crowded-bar','laboratory','laundry-room','night-village','temple','underwater','carousel'] },
  { id:'transport', name:'🚗 交通', sounds:['train','inside-a-train','airplane','sailboat','rowing-boat','submarine'] },
  { id:'things', name:'🔧 物品', sounds:'clock typewriter keyboard washing-machine ceiling-fan dryer boiling-water bubbles paper vinyl-effect wind-chimes slide-projector tuning-radio morse-code windshield-wipers singing-bowl'.split(' ') },
  { id:'noise', name:'📡 噪声', sounds:['white-noise','pink-noise','brown-noise'] },
  { id:'binaural', name:'🧠 双耳节拍', sounds:['binaural-alpha','binaural-beta','binaural-delta','binaural-gamma','binaural-theta'] },
];
const ICONS = { /* keep from earlier, or remove if not needed for brevity */ };
const SMAP = {};
CATS.forEach(c => { if (!c.sounds) return; c.sounds.forEach(s => { SMAP[s] = { cat: c.id, ext: (c.id === 'noise' || c.id === 'binaural') ? '.wav' : '.mp3', label: s.replace(/-/g,' ').replace(/\b\w/g,l=>l.toUpperCase()), icon:'🔊' }; }); });
const PRESET_IDS = [
  ['campfire','wind','clock','cat-purring','rain-on-window','cafe','typewriter','brown-noise'],
  ['river','birds','wind-in-trees','walk-on-leaves','waterfall','campfire','brown-noise','droplets'],
  ['waves','underwater','wind','seagulls','sailboat','wind-in-trees','white-noise','river'],
  ['underwater','wind-in-trees','seagulls','sailboat','waves','white-noise','pink-noise','wind'],
  ['wind','wind-in-trees','brown-noise','campfire','white-noise','walk-on-leaves','river','owl'],
  ['campfire','river','cafe','clock','typewriter','white-noise','wind-in-trees'],
  ['rain-on-window','cafe','typewriter','white-noise'],
];
const PRESET_VOL = [
  { campfire:.7,wind:.2,clock:.3,'cat-purring':.35,'rain-on-window':.25,cafe:.15,typewriter:.25,'brown-noise':.1 },
  { river:.6,birds:.35,'wind-in-trees':.2,'walk-on-leaves':.15,waterfall:.45,campfire:.15,'brown-noise':.08,droplets:.15 },
  { waves:.65,underwater:.3,wind:.25,seagulls:.2,sailboat:.08,'wind-in-trees':.15,'white-noise':.08,river:.2 },
  { underwater:.45,'wind-in-trees':.3,seagulls:.25,sailboat:.08,waves:.25,'white-noise':.1,'pink-noise':.1,wind:.15 },
  { wind:.35,'wind-in-trees':.3,'brown-noise':.12,campfire:.15,'white-noise':.08,'walk-on-leaves':.25,river:.08,owl:.25 },
  { campfire:.35,river:.5,cafe:.35,clock:.25,typewriter:.25,'white-noise':.08,'wind-in-trees':.1 },
  { 'rain-on-window':.5,cafe:.4,typewriter:.2,'white-noise':.05 },
];

let sceneIndex = 0;
let mixes = Array.from({length:SCENE_COUNT},()=>({}));

// ═══════════════════ Web Audio API ═══════════════════
let audioCtx = null;
const bufCache = {};
const activeNodes = {};
let isMuted = false;
let audioReady = false; // true after first user tap

function spath(id){const m=SMAP[id];if(!m)return '';return 'sounds/'+(m.cat?m.cat+'/':'')+id+m.ext;}
function ensureCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}

function loadSound(id){
  if(bufCache[id])return Promise.resolve(bufCache[id]);
  const p=spath(id);if(!p)return Promise.reject('no path');
  return fetch(p).then(r=>{if(!r.ok)throw Error('HTTP '+r.status);return r.arrayBuffer()})
    .then(buf=>ensureCtx().decodeAudioData(buf)).then(ab=>{bufCache[id]=ab;return ab});
}

function playSnd(id, vol){
  if(activeNodes[id]){activeNodes[id].gain.gain.value=vol*(isMuted?0:1);return;}
  loadSound(id).then(ab=>{
    if(!audioReady)return; // don't play until first user tap
    if(activeNodes[id]==='stopped')return;
    const src=audioCtx.createBufferSource();
    src.buffer=ab;src.loop=true;
    const g=audioCtx.createGain();
    g.gain.value=vol*(isMuted?0:1);
    src.connect(g).connect(audioCtx.destination);
    src.start(0);
    activeNodes[id]={source:src,gain:g};
  }).catch(()=>{});
}

function stopSnd(id){
  if(activeNodes[id]&&activeNodes[id]!=='stopped'){
    try{activeNodes[id].source.stop()}catch(_){}
    delete activeNodes[id];
  }
}

function setVol(id,vol){if(activeNodes[id])activeNodes[id].gain.gain.value=vol*(isMuted?0:1);}

function applyMix(){
  const mix=mixes[sceneIndex]||{};
  Object.keys(activeNodes).forEach(id=>{if(!mix[id]||!mix[id].active)stopSnd(id);});
  Object.keys(mix).forEach(id=>{if(mix[id].active)playSnd(id,mix[id].vol);});
}

function setMuted(m){isMuted=m;Object.keys(activeNodes).forEach(id=>{activeNodes[id].gain.gain.value=activeNodes[id].gain.gain.value*(m?0:1)});if(musicAudio)musicAudio.volume=musicVol*(m?0:1);}

function initMixes(){
  for(let i=0;i<SCENE_COUNT;i++){const m={};PRESET_IDS[i].forEach(id=>{const v=PRESET_VOL[i][id]||.5;m[id]={vol:v,active:v>=.25};});mixes[i]=m;}
  try{const ver=localStorage.getItem('mixVersion');if(parseInt(ver)===3){const s=localStorage.getItem('mixes');if(s){const p=JSON.parse(s);for(let i=0;i<SCENE_COUNT;i++){if(p[i])mixes[i]=p[i];}}}}catch(_){}
}
function saveMixes(){try{localStorage.setItem('mixes',JSON.stringify(mixes));localStorage.setItem('mixVersion','3')}catch(_){}}

// ═══════════════════ Video Canvas ═══════════════════
const canvases=[];const ctxs=[];const videos=[];
const VIDEO_LOOP_SEC=5;

function createVideoCanvases(){
  for(let i=0;i<SCENE_COUNT;i++){
    const v=document.createElement('video');
    v.loop=false;v.muted=true;v.playsInline=true;v.preload='metadata';v.src=SCENES[i].video;
    v.addEventListener('timeupdate',()=>{if(v.currentTime>=VIDEO_LOOP_SEC&&!v.loop)v.currentTime=0;});
    videos.push(v);
    const cv=$('cv'+i);cv.classList.add('loading');
    const c=cv.querySelector('canvas');canvases.push(c);ctxs.push(c.getContext('2d'));
  }
  resizeCanvases();
}
function resizeCanvases(){const w=window.innerWidth,h=window.innerHeight;canvases.forEach(c=>{c.width=Math.round(w);c.height=Math.round(h);});}
function coverScale(cw,ch,vw,vh){const s=Math.max(cw/vw,ch/vh);return{x:(cw-vw*s)/2,y:(ch-vh*s)/2,w:vw*s,h:vh*s};}

let drawReq=null;
function drawFrame(){
  const v=videos[sceneIndex];
  if(v.readyState>=2&&!v.paused){const c=canvases[sceneIndex],ctx=ctxs[sceneIndex];if(v.videoWidth){const d=coverScale(c.width,c.height,v.videoWidth,v.videoHeight);ctx.drawImage(v,d.x,d.y,d.w,d.h);}}
  drawReq=requestAnimationFrame(drawFrame);
}

// ═══════════════════ Init Sound (no-op until user taps) ═══════════════════
function initSounds(){
  // Pre-load all preset sound buffers (fetches start, AudioContext not needed yet)
  PRESET_IDS[0].forEach(id=>loadSound(id).catch(()=>{}));
}
initSounds();

// ═══════════════════ First user tap: unlock everything ═══════════════════
function onFirstTap(){
  document.removeEventListener('click',onFirstTap);
  document.removeEventListener('touchstart',onFirstTap);
  // Auto-rotate to landscape
  if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});
  // Unlock audio
  audioReady=true;
  ensureCtx();
  applyMix();
  // Update Mute button state
  try{isMuted=localStorage.getItem('isMuted')==='1';}catch(_){}
  setMuted(isMuted);
  $('ctrlMute').textContent=isMuted?'🔇':'🔊';
}
document.addEventListener('click',onFirstTap,{once:true});
document.addEventListener('touchstart',onFirstTap,{once:true});

// ═══════════════════ UI ═══════════════════
let dimLevel=0;let focusMode=0;
let ctrlTimeout=null;let idleTimeout=null;
const MUSIC_PROXY='http://localhost:8787';
let musicAudio=null;let musicVol=.7;let musicList=[];let musicIndex=-1;
const musicCache={};
let timerMode='clock';let timerRunning=false;let timerStart=0;let timerElapsed=0;let timerDuration=0;let timerTick=null;

function toggleFocus(){
  focusMode=(focusMode+1)%3;const card=$('focusCard');
  card.classList.toggle('on',focusMode>=1);card.classList.toggle('style-b',focusMode===2);
  $('ctrlFocus').style.opacity=focusMode?'1':'.5';$('ctrlFocus').textContent=['◎','◉','○'][focusMode];
  if(focusMode){updateFocusClock();hideCtrl();}try{localStorage.setItem('focusMode',focusMode)}catch(_){}
}
function updateClock(el){const d=new Date();el.textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function hideCtrl(){clearTimeout(ctrlTimeout);clearTimeout(idleTimeout);$('ctrlLayer').classList.remove('show');$('idleTime').classList.add('on');$('idleTimer').classList.add('on');$('idleScene').classList.add('on');$('idleDot').classList.add('on');}
function showCtrl(){clearTimeout(ctrlTimeout);clearTimeout(idleTimeout);$('ctrlLayer').classList.add('show');$('idleTime').classList.remove('on');$('idleTimer').classList.remove('on');$('idleScene').classList.remove('on');$('idleDot').classList.remove('on');ctrlTimeout=setTimeout(hideCtrl,4000);}
function toggleCtrl(){if($('ctrlLayer').classList.contains('show'))hideCtrl();else showCtrl();}
function updateIdleLayer(){$('idleScene').textContent=SCENES[sceneIndex].icon+' '+SCENES[sceneIndex].name;}
function updateCtrlBar(){const icons=$('ctrlBar').querySelectorAll('.ctrl-scene-icon');icons.forEach((b,i)=>b.classList.toggle('active',i===sceneIndex));}
function applyDim(){const v=dimLevel?[0,.3,.6][dimLevel]:0;$('dimOverlay').classList.toggle('on',dimLevel>0);$('dimOverlay').style.opacity=v;$('ctrlDim').textContent=['🌓','🌘','🌒','🌕'][dimLevel];try{localStorage.setItem('dimLevel',dimLevel)}catch(_){}}
function toggleDim(){dimLevel=(dimLevel+1)%4;applyDim();}

let switching=false;let switchSeq=0;
function switchScene(idx){
  if(idx===sceneIndex||switching)return;switching=true;const seq=++switchSeq;
  Object.keys(activeNodes).forEach(stopSnd);
  const oldIdx=sceneIndex,newVid=videos[idx];
  if(!newVid.src||newVid.src.indexOf(SCENES[idx].video)===-1){newVid.src=SCENES[idx].video;newVid.load();}
  $('cv'+oldIdx).classList.remove('active');$('cv'+idx).classList.add('active');
  [((idx-1+SCENE_COUNT)%SCENE_COUNT),((idx+1)%SCENE_COUNT)].forEach(i=>{const v=videos[i];if(!v.src||v.src.indexOf(SCENES[i].video)===-1){v.src=SCENES[i].video;v.load();}});
  sceneIndex=idx;updateIdleLayer();updateCtrlBar();
  document.body.style.background='radial-gradient(ellipse at center,'+SCENES[idx].tone+'66 0%,#000 100%)';
  if(newVid.readyState>=2){
    const c=canvases[idx],ctx=ctxs[idx];const d=coverScale(c.width,c.height,newVid.videoWidth,newVid.videoHeight);
    ctx.drawImage(newVid,d.x,d.y,d.w,d.h);newVid.play().catch(()=>{});applyMix();saveMixes();switching=false;return;
  }
  const onReady=()=>{if(seq!==switchSeq)return;switching=false;newVid.removeEventListener('canplay',onReady);
    const c=canvases[idx],ctx=ctxs[idx];const d=coverScale(c.width,c.height,newVid.videoWidth,newVid.videoHeight);
    ctx.drawImage(newVid,d.x,d.y,d.w,d.h);newVid.play().catch(()=>{});applyMix();saveMixes();};
  newVid.addEventListener('canplay',onReady);
  setTimeout(()=>{if(seq!==switchSeq)return;newVid.removeEventListener('canplay',onReady);newVid.play().catch(()=>{});applyMix();saveMixes();switching=false;},5000);
}

// Music
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function searchMusic(q){
  const c=$('musicResults');c.innerHTML='<div class="mu-empty">搜索中...</div>';
  fetch(MUSIC_PROXY+'/search?q='+encodeURIComponent(q)+'&limit=15').then(r=>r.json()).then(d=>{
    musicList=d.result||d.songs||[];if(!musicList.length){c.innerHTML='<div class="mu-empty">未找到相关歌曲</div>';return;}
    c.innerHTML=musicList.map((s,i)=>'<div class="mu-item" data-i="'+i+'"><div class="mu-cover">🎵</div><div class="mu-info"><div class="mu-name">'+esc(s.name)+'</div><div class="mu-art">'+esc(s.artists?s.artists.map(a=>a.name).join(', '):s.artist||'')+'</div></div><div class="mu-add">+</div></div>').join('');
    c.querySelectorAll('.mu-item').forEach(el=>el.addEventListener('click',()=>playMusic(parseInt(el.dataset.i))));
  }).catch(()=>{c.innerHTML='<div class="mu-empty">搜索失败</div>';});
}
function playMusic(i){const s=musicList[i];if(!s)return;musicIndex=i;const id=s.id;if(musicCache[id]){loadMusic(musicCache[id]);return;}
  fetch(MUSIC_PROXY+'/song/url?id='+id).then(r=>r.json()).then(d=>{const u=d.url||(d.data&&d.data[0]&&d.data[0].url);if(u){musicCache[id]=u;loadMusic(u);}}).catch(()=>{});}
function loadMusic(url){
  if(musicAudio){musicAudio.pause();musicAudio.src='';}
  musicAudio=new Audio(url);musicAudio.volume=musicVol*(isMuted?0:1);musicAudio.play().catch(()=>{});
  $('miniPlayer').style.display='flex';const s=musicList[musicIndex];
  $('nowPlaying').textContent=s?s.name:'-';$('nowArtist').textContent=s?(s.artists?s.artists.map(a=>a.name).join(', '):s.artist||''):'-';$('miniPlayBtn').textContent='⏸';}
function checkLoginStatus(){fetch(MUSIC_PROXY+'/login/status').then(r=>r.json()).then(d=>{if(d.profile||(d.data&&d.data.profile)){const p=d.profile||d.data.profile;$('musicLoginBtn').textContent='👤 '+(p.nickname||'已登录');}}).catch(()=>{});}

// Panels
function openPanel(name){if(name==='sound'){$('soundOverlay').classList.add('open');$('soundPanel').classList.add('open');renderSoundPanel();}if(name==='timer'){$('timerOverlay').classList.add('open');$('timerPanel').classList.add('open');updateTimerDisplay();}}
function closeAllPanels(){['sound','timer'].forEach(n=>{$(n+'Overlay').classList.remove('open');$(n+'Panel').classList.remove('open');});}
function renderSoundPanel(){
  const mix=mixes[sceneIndex]||{};let html='';
  CATS.forEach(cat=>{let ids=cat.sounds;if(cat.id==='preset')ids=PRESET_IDS[sceneIndex];if(!ids||!ids.length)return;
    html+='<div style="font-size:12px;opacity:.4;margin:10px 0 4px 2px">'+cat.name+'</div><div class="sound-grid">';
    ids.forEach(id=>{const m=SMAP[id];const s=mix[id]||{vol:.5,active:false};
      html+='<div class="sound-item'+(s.active?' active':'')+'" data-id="'+id+'"><div class="si-icon">🔊</div><div class="si-label">'+(m?m.label:id)+'</div><input type="range" class="si-vol" min="0" max="1" step=".05" value="'+s.vol+'"></div>';});
    html+='</div>';});
  $('tabNoise').innerHTML=html;
  $('tabNoise').querySelectorAll('.sound-item').forEach(el=>{
    const id=el.dataset.id;
    el.addEventListener('click',e=>{if(e.target.classList.contains('si-vol'))return;const m=mixes[sceneIndex];if(!m[id])m[id]={vol:.5,active:false};m[id].active=!m[id].active;el.classList.toggle('active',m[id].active);applyMix();saveMixes();});
    el.querySelector('.si-vol').addEventListener('input',e=>{const v=parseFloat(e.target.value);const m=mixes[sceneIndex];if(!m[id])m[id]={vol:v,active:v>=.25};m[id].vol=v;m[id].active=v>=.25;el.classList.toggle('active',m[id].active);setVol(id,v);saveMixes();});
  });
}
function updateTimerDisplay(){
  if(timerMode==='clock'){const d=new Date();$('timerDisplay').textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');$('timerLabel').textContent='当前时间';return;}
  let totalMs=0;
  if(timerMode==='stopwatch'){if(timerRunning)timerElapsed+=Date.now()-timerStart;totalMs=timerElapsed;$('timerLabel').textContent='已过时间';}
  if(timerMode==='countdown'||timerMode==='pomodoro'){if(timerRunning)totalMs=Math.max(0,timerDuration-(Date.now()-timerStart));else totalMs=timerDuration;$('timerLabel').textContent='剩余时间';if(timerRunning&&totalMs<=0){clearInterval(timerTick);timerRunning=false;$('timerMainBtn').textContent='▶ 开始';}}
  const sec=Math.floor(totalMs/1000);$('timerDisplay').textContent=Math.floor(sec/60).toString().padStart(2,'0')+':'+(sec%60).toString().padStart(2,'0');
}
function startTimer(){
  if(timerMode==='clock')return;timerRunning=!timerRunning;
  if(timerRunning){
    timerStart=Date.now();if(timerMode==='stopwatch'&&timerElapsed===0)timerElapsed=0;
    if(timerMode==='countdown'||timerMode==='pomodoro'){if(timerDuration===0)timerDuration=25*60000;timerStart=Date.now();}
    timerTick=setInterval(updateTimerDisplay,200);$('timerMainBtn').textContent='⏸ 暂停';
  }else{if(timerMode==='stopwatch')timerElapsed+=Date.now()-timerStart;clearInterval(timerTick);$('timerMainBtn').textContent='▶ 继续';}
}
function resetTimer(){clearInterval(timerTick);timerRunning=false;timerElapsed=0;timerDuration=0;$('timerMainBtn').textContent='▶ 开始';updateTimerDisplay();}
function updateFocusClock(){const d=new Date();$('focusTime').textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

// ═══════════════════ Boot ═══════════════════
createVideoCanvases();window.addEventListener('resize',resizeCanvases);initMixes();
updateIdleLayer();updateCtrlBar();
const v0=videos[0];v0.load();v0.play().catch(()=>{});$('cv0').classList.remove('loading');$('cv0').classList.add('active');
try{dimLevel=parseInt(localStorage.getItem('dimLevel'))||0;}catch(_){}applyDim();
try{focusMode=parseInt(localStorage.getItem('focusMode'))||0;}catch(_){}
if(focusMode){$('focusCard').classList.add('on');if(focusMode===2)$('focusCard').classList.add('style-b');$('ctrlFocus').style.opacity='1';$('ctrlFocus').textContent=['◎','◉','○'][focusMode];updateFocusClock();}
checkLoginStatus();showCtrl();drawFrame();
setInterval(()=>{[$('idleTime'),$('focusTime'),$('ctrlClock')].forEach(e=>updateClock(e));},10000);
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');

// ── Event bindings ──
$('tapLayer').addEventListener('click',toggleCtrl);
$('ctrlLeft').addEventListener('click',e=>{e.stopPropagation();switchScene((sceneIndex-1+SCENE_COUNT)%SCENE_COUNT);});
$('ctrlRight').addEventListener('click',e=>{e.stopPropagation();switchScene((sceneIndex+1)%SCENE_COUNT);});
$('ctrlClose').addEventListener('click',e=>{e.stopPropagation();hideCtrl();});
$('ctrlBar').querySelectorAll('.ctrl-scene-icon').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();switchScene(parseInt(b.dataset.scene));});});
$('ctrlMute').addEventListener('click',e=>{e.stopPropagation();isMuted=!isMuted;setMuted(isMuted);$('ctrlMute').textContent=isMuted?'🔇':'🔊';$('idleDot').style.background=isMuted?'rgba(255,100,100,.6)':'rgba(74,222,128,.7)';});
$('ctrlDim').addEventListener('click',e=>{e.stopPropagation();toggleDim();});
$('ctrlFocus').addEventListener('click',e=>{e.stopPropagation();toggleFocus();});
$('ctrlTimerBtn').addEventListener('click',e=>{e.stopPropagation();openPanel('timer');});
$('ctrlSettings').addEventListener('click',e=>{e.stopPropagation();openPanel('sound');});
$('soundClose').addEventListener('click',closeAllPanels);$('soundOverlay').addEventListener('click',closeAllPanels);
$('timerClose').addEventListener('click',closeAllPanels);$('timerOverlay').addEventListener('click',closeAllPanels);
$('soundTabs').querySelectorAll('.panel-tab').forEach(t=>{t.addEventListener('click',()=>{$('soundTabs').querySelectorAll('.panel-tab').forEach(tt=>tt.classList.remove('active'));t.classList.add('active');const tb=t.dataset.tab;['tabNoise','tabMusic','tabFav'].forEach(id=>$(id).style.display=id==='tabNoise'?(''):'none');if(tb==='music')$('tabMusic').style.display='';if(tb==='fav')$('tabFav').style.display='';});});
$('musicSearch').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();searchMusic(e.target.value.trim());}});
$('musicLoginBtn').addEventListener('click',()=>{$('loginOverlay').classList.toggle('open');});
$('loginClose').addEventListener('click',()=>{$('loginOverlay').classList.remove('open');});
$('switchLogin').addEventListener('click',()=>{/* keep existing login logic */});
$('phoneSubmit').addEventListener('click',()=>{/* keep existing */});
$('miniPlayBtn').addEventListener('click',()=>{if(!musicAudio)return;if(musicAudio.paused){musicAudio.play();$('miniPlayBtn').textContent='⏸';}else{musicAudio.pause();$('miniPlayBtn').textContent='▶';}});
$('miniVol').addEventListener('input',e=>{musicVol=e.target.value/100;if(musicAudio)musicAudio.volume=musicVol*(isMuted?0:1);});
$('timerModes').querySelectorAll('.timer-mode').forEach(t=>{t.addEventListener('click',()=>{$('timerModes').querySelectorAll('.timer-mode').forEach(tt=>tt.classList.remove('active'));t.classList.add('active');timerMode=t.dataset.mode;resetTimer();$('timerSet').style.display=(timerMode==='countdown'||timerMode==='pomodoro')?'flex':'none';if(timerMode==='clock'){showCtrl();hideCtrl();}updateTimerDisplay();});});
$('timerMainBtn').addEventListener('click',()=>{if(timerMode==='clock')return;if(timerMode==='countdown'||timerMode==='pomodoro'){timerDuration=((parseInt($('tsMin').value)||25)*60+(parseInt($('tsSec').value)||0))*1000;if(!timerRunning)timerElapsed=0;}startTimer();});
$('timerResetBtn').addEventListener('click',resetTimer);

let tx=0,ty=0;
$('tapLayer').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
$('tapLayer').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;const dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){if(dx<0)switchScene((sceneIndex+1)%SCENE_COUNT);else switchScene((sceneIndex-1+SCENE_COUNT)%SCENE_COUNT);}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')switchScene((sceneIndex-1+SCENE_COUNT)%SCENE_COUNT);if(e.key==='ArrowRight')switchScene((sceneIndex+1)%SCENE_COUNT);if(e.key===' '||e.key==='Escape')toggleCtrl();if(e.key==='d')toggleDim();if(e.key==='f')toggleFocus();if(e.key==='m'){isMuted=!isMuted;setMuted(isMuted);$('ctrlMute').textContent=isMuted?'🔇':'🔊';}});

// Focus clock update interval
setInterval(updateFocusClock,10000);
</script>
