<!DOCTYPE html>
<html><body><script>
function make(size) {
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.roundRect(0,0,size,size,size*.18); ctx.fill();
  const cx = size/2, cy = size/2, r = size*.28;
  ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.lineWidth = size*.02;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = size*.012;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy-r*.6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*.45,cy); ctx.stroke();
  ctx.fillStyle = 'rgba(74,222,128,.6)'; ctx.beginPath(); ctx.arc(cx,cy,size*.035,0,Math.PI*2); ctx.fill();
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  document.body.appendChild(a); a.click(); a.remove();
}
make(192); setTimeout(() => make(512), 500);
</script><p>Icons should download automatically. Move them to the web folder.</p></body></html>
