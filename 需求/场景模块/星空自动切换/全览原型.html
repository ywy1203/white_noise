<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原型 — 星空场景自动切换</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0b1a; color: #e0e0e0;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex; justify-content: center; padding: 40px 20px;
  }
  .frame {
    max-width: 860px; width: 100%; background: #0d0d20;
    border-radius: 16px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  /* 顶部信息 */
  .header {
    padding: 20px 24px; background: linear-gradient(135deg, #111128, #0d0d20);
    border-bottom: 1px solid #1a1a3a;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #f0c040; }
  .header p { font-size: 13px; color: #8899bb; margin-top: 4px; }
  .header .scope { font-size: 12px; color: #556; margin-top: 6px; }

  /* 顶部 bar */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; border-bottom: 1px solid #1a1a3a;
  }
  .topbar .nav { display: flex; align-items: center; gap: 6px; }
  .topbar .nav button {
    background: #1a1a3a; border: none; color: #aab; padding: 6px 10px;
    border-radius: 6px; font-size: 13px; cursor: default;
  }
  .topbar .scene-name { color: #dde; font-size: 14px; margin: 0 4px; }
  .topbar .right { margin-left: auto; display: flex; gap: 8px; }
  .topbar .right button {
    background: #1a1a3a; border: none; color: #aab; padding: 6px 10px;
    border-radius: 6px; font-size: 13px; cursor: default;
  }

  /* 视频区域 */
  .video {
    height: 300px; margin: 16px 20px; border-radius: 10px;
    background: linear-gradient(135deg, #0a0a2e, #1a1040);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .video .stars {
    position: absolute; width: 100%; height: 100%;
    background-image:
      radial-gradient(1px 1px at 20px 30px, #eee, transparent),
      radial-gradient(1px 1px at 40px 70px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 90px 40px, #fff, transparent),
      radial-gradient(1px 1px at 130px 80px, #ddd, transparent),
      radial-gradient(1px 1px at 160px 30px, #eee, transparent),
      radial-gradient(1.5px 1.5px at 200px 60px, #fff, transparent),
      radial-gradient(1px 1px at 250px 90px, #ddd, transparent),
      radial-gradient(1px 1px at 300px 40px, #eee, transparent),
      radial-gradient(1.5px 1.5px at 350px 70px, #fff, transparent),
      radial-gradient(1px 1px at 400px 50px, #ddd, transparent),
      radial-gradient(1px 1px at 450px 80px, #eee, transparent),
      radial-gradient(1.5px 1.5px at 500px 30px, #fff, transparent),
      radial-gradient(1px 1px at 550px 60px, #ddd, transparent),
      radial-gradient(1px 1px at 600px 90px, #eee, transparent),
      radial-gradient(1.5px 1.5px at 650px 40px, #fff, transparent),
      radial-gradient(2px 2px at 700px 70px, #ffd, transparent),
      radial-gradient(1px 1px at 750px 50px, #eee, transparent),
      radial-gradient(1px 1px at 800px 30px, #fff, transparent);
  }
  .video .label { font-size: 13px; color: #667; z-index: 1; }

  /* 底部栏 */
  .bottombar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-top: 1px solid #1a1a3a;
    margin: 0 4px;
  }
  .bottombar .group { display: flex; align-items: center; gap: 4px; }
  .bottombar .sep { color: #334; font-size: 14px; margin: 0 4px; }
  .bottombar button {
    background: #1a1a3a; border: none; color: #aab; padding: 8px 14px;
    border-radius: 8px; font-size: 13px; cursor: default; transition: none;
  }
  .bottombar button.active { background: #2a3a6a; color: #6af; }
  .bottombar button.highlight { background: #2a4a3a; color: #4f8; border: 1px solid #4f8; }
  .bottombar button .tag {
    display: inline-block; font-size: 10px; background: #f59e0b33;
    color: #f59e0b; padding: 0 6px; border-radius: 3px; margin-left: 4px;
  }

  /* 标签 */
  .tag-new {
    display: inline-block; font-size: 10px; background: #f59e0b33;
    color: #f59e0b; padding: 0 6px; border-radius: 3px; margin-left: 4px;
  }

  /* 区域标注 */
  .area-label {
    font-size: 11px; color: #445; text-align: center; padding: 2px 0 8px;
  }
  .area-label span { margin: 0 10px; }

  /* 弹出面板 */
  .panel-area {
    padding: 0 20px 20px;
  }
  .panel {
    background: #14142e; border: 1px solid #2a2a4a; border-radius: 10px;
    padding: 16px; max-width: 280px;
  }
  .panel-title { font-size: 13px; color: #889; margin-bottom: 10px; }
  .panel-option {
    padding: 8px 0; border-bottom: 1px solid #1a1a3a;
    font-size: 13px; color: #889; cursor: default;
  }
  .panel-option:last-child { border-bottom: none; }
  .panel-option.selected { color: #6af; }
  .panel-option .radio { display: inline-block; width: 14px; text-align: center; margin-right: 8px; }
  .panel-option.selected .radio { color: #6af; }

  /* 交互说明 */
  .note {
    background: #111128; border: 1px solid #1a1a3a; border-radius: 8px;
    padding: 12px 16px; margin: 0 20px 20px; font-size: 13px; color: #778;
    line-height: 1.8;
  }
  .note strong { color: #aab; }
  .note .arrow { color: #f59e0b; }
</style>
</head>
<body>

<div class="frame">

  <!-- 顶部信息 -->
  <div class="header">
    <h1>⭐ 星空自动切换</h1>
    <p>新增自动轮播按钮，每 N 分钟自动切换到下一个场景</p>
    <div class="scope">改动范围：底部控制栏 · 不新增页面</div>
  </div>

  <!-- 顶部栏 -->
  <div class="topbar">
    <div class="nav">
      <button>◀</button>
      <span class="scene-name">⭐ 星空</span>
      <button>▶</button>
    </div>
    <div class="right">
      <button>🔇</button>
    </div>
  </div>

  <!-- 视频 -->
  <div class="video">
    <div class="stars"></div>
    <div class="label">星空场景 (starlight.mp4)</div>
  </div>

  <!-- 底部控制栏 -->
  <div class="bottombar">
    <div class="group">
      <button>🔥</button>
      <button>☔</button>
      <button>🌳</button>
      <button class="active">⭐</button>
    </div>
    <span class="sep">|</span>
    <div class="group">
      <button>🕐 14:30</button>
    </div>
    <span class="sep">|</span>
    <div class="group">
      <button>▶</button>
      <button>⏹</button>
    </div>
    <span class="sep">|</span>
    <div class="group">
      <button>25min</button>
    </div>
    <span class="sep">|</span>
    <div class="group">
      <button class="highlight">🔁<span class="tag-new">新增</span></button>
    </div>
  </div>
  <div class="area-label">
    <span>场景切换</span>
    <span>计时</span>
    <span>播放控制</span>
    <span>倒计时 25min</span>
    <span style="color:#f59e0b;">🔁 自动轮播</span>
  </div>

  <!-- 弹出面板 -->
  <div class="panel-area">
    <div class="panel">
      <div class="panel-title">自动切换间隔</div>
      <div class="panel-option"><span class="radio">○</span>15 分钟</div>
      <div class="panel-option selected"><span class="radio">●</span>30 分钟 <span style="color:#556; font-size:11px;">(默认)</span></div>
      <div class="panel-option"><span class="radio">○</span>45 分钟</div>
      <div class="panel-option"><span class="radio">○</span>60 分钟</div>
    </div>
  </div>

  <!-- 交互说明 -->
  <div class="note">
    <strong>交互说明</strong><br>
    <span class="arrow">→</span> 点击 <strong>🔁</strong> 开启自动轮播，按钮高亮<br>
    <span class="arrow">→</span> 长按 <strong>🔁</strong> 弹出间隔设置面板<br>
    <span class="arrow">→</span> 手动切换场景 → 重新计时<br>
    <span class="arrow">→</span> 倒计时结束 → 自动停止轮播<br>
    <span class="arrow">→</span> 仅一个场景时 🔁 置灰不可点
  </div>

</div>

</body>
</html>
